name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Build React app (Vite)
        run: npx vite build

      - name: Package DMG (electron-builder)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-app/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Convert logo.png to logo.ico
        shell: bash
        run: magick logo.png -resize 256x256 logo.ico

      - name: Build React app (Vite)
        run: npx vite build

      - name: Package EXE (electron-builder)
        run: npx electron-builder --win nsis --publish never

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-app/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
